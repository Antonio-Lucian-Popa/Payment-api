services:
  payment-api:
    # Construiește imaginea local din Dockerfile-ul proiectului
    build:
      context: .
      dockerfile: Dockerfile

    # Numele containerului folosit și în upstream-ul Nginx, dacă sunt pe aceeași rețea Docker
    container_name: payment-api

    # Pornește containerul automat după restart de server sau crash
    restart: unless-stopped

    # Încarcă secretele și variabilele de configurare din fișierul .env
    env_file:
      - .env

    # Suprascriem explicit valorile importante pentru production
    environment:
      NODE_ENV: production
      PORT: 3000

    # Conectează serviciul la rețeaua Docker comună a serverului
    networks:
      - nova-net

    # Expune portul către alte containere din aceeași rețea Docker
    expose:
      - "3000"

    # Health check simplu pe endpoint-ul intern al API-ului
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/payment/health').then((res) => { process.exit(res.ok ? 0 : 1); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  nova-net:
    external: true
